<!DOCTYPE html>
<html lang = "pt-BR">
  <head>
    <meta charser = "UTF-8">
    <meta name = "vierport" content = "width=device-width, initial-scale=1.0">
<title>
  Football Manager - 26
</title>
    <style>
body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            color: #fff;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
.placar-container {
            background-color: #2c3e50;
            padding: 20px 40px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            gap: 30px;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
        }
     .tempo {
            color: #f1c40f;
            background: #000;
            padding: 5px 10px;
            border-radius: 5px;
            font-family: monospace;
        }
        #narracao {
            width: 100%;
            max-width: 600px;
            height: 300px;
            background-color: #111;
            border: 2px solid #333;
            border-radius: 5px;
            padding: 15px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 14px;
            line-height: 1.6;
        }
        .btn-jogar {
            background-color: #27ae60;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 18px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }
        .btn-jogar:hover { background-color: #219653; }
        .gol { color: #2ecc71; font-weight: bold; }
        .perigo { color: #e74c3c; }
</style>
  </head>
<body>

    <img src="https://www.meioemensagem.com.br/wp-content/uploads/2023/05/fifa-thumb.jpg" alt="Copa do Mundo 2026" style="max-width: 600px; width: 100%; height: auto; border-radius: 8px; margin-bottom: 20px;">
    

    <div class="placar-container">
        <span id="nome-casa">Time Casa</span>
        <span id="gols-casa">0</span>
        <span class="tempo" id="relogio">00'</span>
        <span id="gols-fora">0</span>
        <span id="nome-fora">Time Fora</span>
    </div>

    <button class="btn-jogar" id="btn-iniciar" onclick="iniciarPartida()">Iniciar Partida</button>

    <h3>Narração dos Lances:</h3>
    <div id="narracao"></div>
